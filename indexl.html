<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>班级积分公示板</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        .error { color: red; }
        .search-box { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>班级积分公示板（只读）</h1>
    <div class="search-box">
        <input type="text" id="searchId" placeholder="按学号查询">
        <button id="searchBtn">查询</button>
        <button id="resetBtn">显示全部</button>
    </div>
    <table id="scoreTable">
        <thead>
            <tr><th>学号</th><th>姓名</th><th>积分</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        // 公共仓库无需 Token，直接读取
        const REPO_OWNER = "naonao1111-art";      // 替换为你的用户名
        const REPO_NAME = "class-point-register"; // 替换为你的仓库名
        const DATA_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json`;

        let currentStudents = [];

        async function loadData() {
            try {
                const resp = await fetch(DATA_URL);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const content = atob(data.content);
                const json = JSON.parse(content);
                currentStudents = json.students || [];
                renderTable(currentStudents);
            } catch (err) {
                document.body.innerHTML += `<p class="error">加载失败：${err.message}</p>`;
            }
        }

        function renderTable(students) {
            const tbody = document.querySelector("#scoreTable tbody");
            tbody.innerHTML = "";
            students.forEach(s => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = s.id;
                row.insertCell(1).innerText = s.name;
                row.insertCell(2).innerText = s.score;
            });
        }

        document.getElementById("searchBtn").onclick = () => {
            const searchId = document.getElementById("searchId").value.trim();
            if (!searchId) renderTable(currentStudents);
            else {
                const filtered = currentStudents.filter(s => s.id.includes(searchId));
                renderTable(filtered);
            }
        };
        document.getElementById("resetBtn").onclick = () => {
            document.getElementById("searchId").value = "";
            renderTable(currentStudents);
        };

        loadData();
    </script>
</body>
</html>
