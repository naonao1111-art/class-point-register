<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员后台</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table, th, td { border: 1px solid #ccc; border-collapse: collapse; padding: 5px; }
        .section { margin: 20px 0; padding: 10px; border: 1px solid #aaa; }
        button { margin: 2px; }
        .error { color: red; }
        .success { color: green; }
        .token-input { margin-bottom: 10px; background: #f9f9f9; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="loginPanel">
        <h2>管理员登录</h2>
        <div class="token-input">
            <label>GitHub Token (需要 repo 权限): </label>
            <input type="password" id="githubToken" style="width: 300px;" placeholder="输入你的 Personal Access Token">
            <button id="saveTokenBtn">保存 Token</button>
            <span id="tokenStatus"></span>
        </div>
        <div>
            <label>后台密码: </label>
            <input type="password" id="adminPwd" placeholder="密码">
            <button id="loginBtn">登录</button>
            <p id="loginMsg" class="error"></p>
        </div>
    </div>

    <div id="adminPanel" style="display:none;">
        <h1>班级积分管理后台</h1>

        <div class="section">
            <h3>学生增删改查</h3>
            <div>
                <input type="text" id="stuId" placeholder="学号">
                <input type="text" id="stuName" placeholder="姓名">
                <input type="number" id="stuScore" placeholder="积分" value="100">
                <button id="addStuBtn">添加学生</button>
                <button id="updateStuBtn">修改当前选中</button>
                <button id="deleteStuBtn">删除选中</button>
            </div>
            <hr>
            <div>
                <input type="text" id="searchIdAdmin" placeholder="按学号查询">
                <button id="searchAdminBtn">查询</button>
                <button id="resetAdminBtn">显示全部</button>
            </div>
            <table id="stuTable">
                <thead>
                    <tr>
                        <th>选择</th>
                        <th>单选</th>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>积分</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="section">
            <h3>互换学号（姓名和积分会跟随交换）</h3>
            <input type="text" id="swapId1" placeholder="学号A">
            <input type="text" id="swapId2" placeholder="学号B">
            <button id="swapBtn">交换</button>
        </div>

        <div class="section">
            <h3>批量修改积分（多选或全选）</h3>
            <div>
                <button id="selectAllBtn">全选</button>
                <button id="deselectAllBtn">取消全选</button>
            </div>
            <div>
                <label>分数变化: </label>
                <input type="number" id="batchDelta" placeholder="例如 +5 或 -2">
                <label>原因: </label>
                <input type="text" id="batchReason" placeholder="流动红旗全班+5" style="width: 200px;">
                <button id="batchUpdateBtn">批量修改</button>
            </div>
        </div>

        <div class="section">
            <h3>加减分原因记录（仅可编辑原因文本）</h3>
            <table id="reasonsTable">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>分数变化</th>
                        <th>原因（可编辑）</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <p id="adminMsg"></p>
    </div>

    <script>
        // ========== 配置（请修改为你的实际信息）==========
        const REPO_OWNER = "naonao1111-art";
        const REPO_NAME = "class-point-register";
        const DATA_FILE = "data.json";
        const REASONS_FILE = "reasons.json";
        const DATA_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`;
        const REASONS_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${REASONS_FILE}`;
        const ADMIN_PASSWORD = "yjsawnnslbtn0211";  // 请修改为你自己的后台密码

        let currentToken = "";
        let currentStudents = [];
        let currentReasons = [];
        let dataSha = "";
        let reasonsSha = "";
        let selectedStudentId = null;

        // ========== 正确的 Base64 编解码（支持 UTF-8 中文） ==========
        function base64DecodeToUtf8(base64Str) {
            const binaryStr = atob(base64Str);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }
            return new TextDecoder('utf-8').decode(bytes);
        }

        function utf8ToBase64(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            let binary = '';
            for (let i = 0; i < data.length; i++) {
                binary += String.fromCharCode(data[i]);
            }
            return btoa(binary);
        }

        // ========== GitHub API 操作 ==========
        async function fetchJSON(url, token) {
            const headers = token ? { Authorization: `token ${token}` } : {};
            const resp = await fetch(url, { headers });
            if (resp.status === 404) return { content: null, sha: null };
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            const content = JSON.parse(base64DecodeToUtf8(data.content));
            return { content, sha: data.sha };
        }

        async function saveJSON(url, content, sha, token, message) {
            const jsonStr = JSON.stringify(content, null, 2);
            const newContent = utf8ToBase64(jsonStr);
            const payload = { message, content: newContent, sha };
            const resp = await fetch(url, {
                method: "PUT",
                headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (!resp.ok) throw new Error(`保存失败 HTTP ${resp.status}`);
            const result = await resp.json();
            return result.content.sha;
        }

        async function loadAllData() {
            const dataRes = await fetchJSON(DATA_URL, currentToken);
            if (dataRes.content) {
                currentStudents = dataRes.content.students || [];
                dataSha = dataRes.sha;
            } else {
                currentStudents = [];
                dataSha = null;
            }
            const reasonsRes = await fetchJSON(REASONS_URL, currentToken);
            if (reasonsRes.content) {
                currentReasons = reasonsRes.content;
                reasonsSha = reasonsRes.sha;
            } else {
                currentReasons = [];
                reasonsSha = null;
            }
        }

        async function saveStudents() {
            const newData = { students: currentStudents };
            dataSha = await saveJSON(DATA_URL, newData, dataSha, currentToken, "更新学生数据");
        }

        async function saveReasons() {
            reasonsSha = await saveJSON(REASONS_URL, currentReasons, reasonsSha, currentToken, "更新原因记录");
        }

        // ========== 渲染表格 ==========
        function renderStudentsTable() {
            const tbody = document.querySelector("#stuTable tbody");
            tbody.innerHTML = "";
            currentStudents.forEach(s => {
                const row = tbody.insertRow();
                // 复选框（多选）
                const chkCell = row.insertCell(0);
                const chk = document.createElement("input");
                chk.type = "checkbox";
                chk.className = "student-checkbox";
                chk.value = s.id;
                chkCell.appendChild(chk);
                // 单选按钮（用于单个修改）
                const radioCell = row.insertCell(1);
                const radio = document.createElement("input");
                radio.type = "radio";
                radio.name = "selectedStu";
                radio.value = s.id;
                radio.onclick = () => { selectedStudentId = s.id; };
                radioCell.appendChild(radio);
                // 学号、姓名、积分
                row.insertCell(2).innerText = s.id;
                row.insertCell(3).innerText = s.name;
                row.insertCell(4).innerText = s.score;
            });
        }

        function renderReasonsTable() {
            const tbody = document.querySelector("#reasonsTable tbody");
            tbody.innerHTML = "";
            currentReasons.forEach((r, idx) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = r.timestamp;
                row.insertCell(1).innerText = r.studentId;
                row.insertCell(2).innerText = r.studentName;
                row.insertCell(3).innerText = (r.delta > 0 ? "+" : "") + r.delta;
                const reasonCell = row.insertCell(4);
                const inputReason = document.createElement("input");
                inputReason.type = "text";
                inputReason.value = r.reason;
                inputReason.style.width = "200px";
                reasonCell.appendChild(inputReason);
                const btnCell = row.insertCell(5);
                const saveBtn = document.createElement("button");
                saveBtn.innerText = "保存";
                saveBtn.onclick = async () => {
                    currentReasons[idx].reason = inputReason.value;
                    await saveReasons();
                    renderReasonsTable();
                    document.getElementById("adminMsg").innerText = "原因已更新";
                };
                btnCell.appendChild(saveBtn);
            });
        }

        // ========== 批量修改功能 ==========
        async function batchUpdate() {
            // 验证管理员密码
            const pwd = prompt("请输入管理员密码进行批量修改:");
            if (pwd !== ADMIN_PASSWORD) {
                alert("密码错误，操作取消");
                return;
            }

            const checkboxes = document.querySelectorAll(".student-checkbox:checked");
            if (checkboxes.length === 0) {
                alert("请至少选择一个学生");
                return;
            }
            const delta = parseInt(document.getElementById("batchDelta").value);
            if (isNaN(delta)) {
                alert("请输入有效的分数变化");
                return;
            }
            const reason = document.getElementById("batchReason").value.trim();
            if (!reason) {
                alert("请输入修改原因");
                return;
            }

            // 收集需要修改的学生
            const updates = [];
            for (let chk of checkboxes) {
                const sid = chk.value;
                const student = currentStudents.find(s => s.id === sid);
                if (student) {
                    let newScore = student.score + delta;
                    newScore = Math.min(200, Math.max(0, newScore));
                    if (newScore !== student.score) {
                        updates.push({ student, oldScore: student.score, newScore });
                    }
                }
            }
            if (updates.length === 0) {
                alert("所选学生积分均无变化（已达上限或下限）");
                return;
            }

            if (!confirm(`即将修改 ${updates.length} 名学生，积分变化 ${delta>0?"+":""}${delta}，原因：“${reason}”。确认吗？`)) {
                return;
            }

            // 修改内存中学生积分
            for (let u of updates) {
                u.student.score = u.newScore;
            }
            await saveStudents();

            // 追加原因记录
            const now = new Date().toISOString().slice(0,19).replace('T',' ');
            const newRecords = updates.map(u => ({
                timestamp: now,
                studentId: u.student.id,
                studentName: u.student.name,
                delta: delta,
                reason: reason
            }));
            currentReasons.push(...newRecords);
            await saveReasons();

            // 刷新界面
            renderStudentsTable();
            renderReasonsTable();
            document.getElementById("adminMsg").innerText = `批量修改成功，共 ${updates.length} 名学生`;
        }

        // ========== 增删改查操作 ==========
        async function addStudent() {
            const id = document.getElementById("stuId").value.trim();
            const name = document.getElementById("stuName").value.trim();
            let score = parseInt(document.getElementById("stuScore").value);
            if (!id || !name) { alert("学号和姓名不能为空"); return; }
            if (isNaN(score)) score = 100;
            score = Math.min(200, Math.max(0, score));
            if (currentStudents.find(s => s.id === id)) { alert("学号已存在"); return; }
            currentStudents.push({ id, name, score });
            await saveStudents();
            renderStudentsTable();
            document.getElementById("adminMsg").innerText = "添加成功";
        }

        async function updateStudent() {
            if (!selectedStudentId) { alert("请先选择一个学生"); return; }
            const id = document.getElementById("stuId").value.trim();
            const name = document.getElementById("stuName").value.trim();
            let score = parseInt(document.getElementById("stuScore").value);
            if (!id || !name) { alert("学号和姓名不能为空"); return; }
            if (isNaN(score)) score = 100;
            score = Math.min(200, Math.max(0, score));
            const index = currentStudents.findIndex(s => s.id === selectedStudentId);
            if (index === -1) return;
            if (id !== selectedStudentId && currentStudents.some(s => s.id === id)) {
                alert("新学号已存在"); return;
            }
            currentStudents[index] = { id, name, score };
            await saveStudents();
            selectedStudentId = id;
            renderStudentsTable();
            document.getElementById("adminMsg").innerText = "修改成功";
        }

        async function deleteStudent() {
            if (!selectedStudentId) { alert("请先选择一个学生"); return; }
            if (!confirm("确定删除吗？")) return;
            currentStudents = currentStudents.filter(s => s.id !== selectedStudentId);
            await saveStudents();
            selectedStudentId = null;
            renderStudentsTable();
            document.getElementById("adminMsg").innerText = "删除成功";
        }

        async function swapStudents() {
            const id1 = document.getElementById("swapId1").value.trim();
            const id2 = document.getElementById("swapId2").value.trim();
            if (!id1 || !id2) { alert("请输入两个学号"); return; }
            const stu1 = currentStudents.find(s => s.id === id1);
            const stu2 = currentStudents.find(s => s.id === id2);
            if (!stu1 || !stu2) { alert("学号不存在"); return; }

            // 只交换学号（姓名和积分不变）
            stu1.id = id2;
            stu2.id = id1;

            // 同步更新 reasons 中所有相关记录的学号
            for (let r of currentReasons) {
                 if (r.studentId === id1) {
                      r.studentId = id2;
                } else if (r.studentId === id2) {
                     r.studentId = id1;
                }
            }

            // 保存学生数据和原因记录
            await saveStudents();
            await saveReasons();

            // 刷新表格显示
            renderStudentsTable();
            renderReasonsTable();
            document.getElementById("adminMsg").innerText = "学号交换成功，并已同步历史记录";
        }

        function filterStudents() {
            const searchId = document.getElementById("searchIdAdmin").value.trim();
            if (!searchId) renderStudentsTable();
            else {
                const filtered = currentStudents.filter(s => s.id.includes(searchId));
                const tbody = document.querySelector("#stuTable tbody");
                tbody.innerHTML = "";
                filtered.forEach(s => {
                    const row = tbody.insertRow();
                    const chkCell = row.insertCell(0);
                    const chk = document.createElement("input");
                    chk.type = "checkbox";
                    chk.className = "student-checkbox";
                    chk.value = s.id;
                    chkCell.appendChild(chk);
                    const radioCell = row.insertCell(1);
                    const radio = document.createElement("input");
                    radio.type = "radio";
                    radio.name = "selectedStu";
                    radio.value = s.id;
                    radio.onclick = () => { selectedStudentId = s.id; };
                    radioCell.appendChild(radio);
                    row.insertCell(2).innerText = s.id;
                    row.insertCell(3).innerText = s.name;
                    row.insertCell(4).innerText = s.score;
                });
            }
        }

        // ========== 登录逻辑 ==========
        document.getElementById("saveTokenBtn").onclick = () => {
            const token = document.getElementById("githubToken").value.trim();
            if (token) {
                sessionStorage.setItem("github_token", token);
                currentToken = token;
                document.getElementById("tokenStatus").innerText = "Token 已保存（当前会话有效）";
                document.getElementById("tokenStatus").style.color = "green";
            } else {
                document.getElementById("tokenStatus").innerText = "请输入有效的 Token";
            }
        };

        document.getElementById("loginBtn").onclick = async () => {
            const pwd = document.getElementById("adminPwd").value;
            if (pwd !== ADMIN_PASSWORD) {
                document.getElementById("loginMsg").innerText = "密码错误";
                return;
            }
            let token = sessionStorage.getItem("github_token");
            if (!token) {
                token = document.getElementById("githubToken").value.trim();
                if (!token) {
                    document.getElementById("loginMsg").innerText = "请先输入并保存 GitHub Token";
                    return;
                }
                sessionStorage.setItem("github_token", token);
            }
            currentToken = token;
            try {
                await loadAllData();
                document.getElementById("loginPanel").style.display = "none";
                document.getElementById("adminPanel").style.display = "block";
                renderStudentsTable();
                renderReasonsTable();
                // 绑定事件
                document.getElementById("addStuBtn").onclick = addStudent;
                document.getElementById("updateStuBtn").onclick = updateStudent;
                document.getElementById("deleteStuBtn").onclick = deleteStudent;
                document.getElementById("swapBtn").onclick = swapStudents;
                document.getElementById("searchAdminBtn").onclick = filterStudents;
                document.getElementById("resetAdminBtn").onclick = () => {
                    document.getElementById("searchIdAdmin").value = "";
                    renderStudentsTable();
                };
                // 批量修改事件
                document.getElementById("selectAllBtn").onclick = () => {
                    document.querySelectorAll(".student-checkbox").forEach(cb => cb.checked = true);
                };
                document.getElementById("deselectAllBtn").onclick = () => {
                    document.querySelectorAll(".student-checkbox").forEach(cb => cb.checked = false);
                };
                document.getElementById("batchUpdateBtn").onclick = batchUpdate;
            } catch (err) {
                document.getElementById("loginMsg").innerText = "加载数据失败：" + err.message;
            }
        };

        // 预填已保存的 Token
        const savedToken = sessionStorage.getItem("github_token");
        if (savedToken) {
            document.getElementById("githubToken").value = savedToken;
            document.getElementById("tokenStatus").innerText = "已有保存的 Token（需再次输入密码登录）";
        }
    </script>
</body>
</html>
